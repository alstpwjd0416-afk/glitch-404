<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GL!TCH 404: Style Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; max-width: 600px; padding: 28px 24px 16px; }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .logo-text { font-size: 28px; font-weight: 900; letter-spacing: 0.15em; background: linear-gradient(90deg, #fff 0%, #A855F7 50%, #C6FF00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: 11px; color: #666; letter-spacing: 0.2em; }
  .divider { margin-top: 12px; height: 1px; background: linear-gradient(90deg, #A855F7, #C6FF00, transparent); }
  #chat { flex: 1; width: 100%; max-width: 600px; padding: 16px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; max-height: calc(100vh - 180px); }
  .msg { display: flex; align-items: flex-start; }
  .msg.user { justify-content: flex-end; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #A855F7, #C6FF00); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; color: #000; margin-right: 8px; flex-shrink: 0; margin-top: 2px; }
  .bubble { max-width: 78%; padding: 12px 16px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; color: #f0f0f0; }
  .bubble.ai { background: #161616; border: 1px solid #222; border-radius: 18px 18px 18px 4px; }
  .bubble.user { background: linear-gradient(135deg, #A855F7, #7c3aed); border-radius: 18px 18px 4px 18px; }
  .typing { display: flex; gap: 5px; padding: 12px 16px; background: #161616; border: 1px solid #222; border-radius: 18px 18px 18px 4px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #A855F7; animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
  footer { width: 100%; max-width: 600px; padding: 12px 16px 24px; }
  .input-box { display: flex; gap: 8px; align-items: flex-end; background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; padding: 8px 8px 8px 16px; }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: #f0f0f0; font-size: 14px; resize: none; font-family: inherit; line-height: 1.5; max-height: 100px; overflow-y: auto; padding: 6px 0; }
  textarea::placeholder { color: #444; }
  button { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #A855F7, #C6FF00); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  button:disabled { background: #2a2a2a; cursor: default; }
  .credit { text-align: center; margin-top: 8px; font-size: 10px; color: #333; letter-spacing: 0.15em; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 40 40"><path d="M20 2 L23 17 L38 20 L23 23 L20 38 L17 23 L2 20 L17 17 Z" fill="#A855F7"/></svg>
    <span class="logo-text">GL!TCH</span>
  </div>
  <div class="subtitle">AI STYLE SYSTEM · 404: STYLE FOUND</div>
  <div class="divider"></div>
</header>

<div id="chat"></div>

<footer>
  <div class="input-box">
    <textarea id="input" placeholder="체형 정보나 질문을 입력해줘..." rows="1"></textarea>
    <button id="send" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="credit">FUNCTION BUILDS IDENTITY · GL!TCH TECHWEAR SYSTEM</div>
</footer>

<script>
const API_KEY = "AQ.Ab8RN6Kw8ZRx1_FJj2wDeCJfYsx6evH5GWwXfEBq_SshTIMY_g"; // ← 여기에 Gemini API 키 붙여넣기

const SYSTEM = `당신은 GL!TCH의 공식 AI 스타일리스트입니다.
브랜드명: GL!TCH / 슬로건: "GL!TCH 404: Style found"
오류(glitch)를 새로운 가능성으로 바라보고, 각자의 개성과 차이를 존중하는 테크웨어 브랜드.
타겟: 20-30대 남녀 / 개성과 기능성을 동시에 원하는 사람들

말투: 반말, 쿨하고 친근한 톤. ✦ ◈ 같은 기호 가끔 사용.

대화 흐름:
1. 체형 정보(키/몸무게/어깨/가슴/허리/엉덩이 둘레) 입력받기 - 모르면 스킵 가능
2. 체형 분석 (모래시계/역삼각/삼각/직사각/둥근형)
3. 퍼스널컬러 입력받기 (봄웜/여름쿨/가을웜/겨울쿨, 모르면 스킵)
4. 기온과 날씨 입력받기
5. 스타일 무드 질문 (스트릿/스포티/미니멀/레이어드 등)
6. 상의+하의+아우터+신발 완성형 코디 추천
7. 마지막엔 항상 "이게 네 GL!TCH야. 404: Style found. ✦" 붙이기`;

const history = [];

const intro = `안녕, 나는 GL!TCH의 AI 스타일리스트야. ✦
GL!TCH 404: Style found —
아직 자신만의 스타일을 못 찾았어도 괜찮아. 내가 찾아줄게.

먼저 체형 정보를 알려줘. 모르는 항목은 스킵해도 돼:
• 키 (cm)
• 몸무게 (kg)
• 어깨 너비 / 가슴 둘레 / 허리 둘레 / 엉덩이 둘레 (cm)`;

function addMsg(role, text) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "ai");
  if (role === "ai") {
    div.innerHTML = `<div class="avatar">G</div><div class="bubble ai">${text}</div>`;
  } else {
    div.innerHTML = `<div class="bubble user">${text}</div>`;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showTyping() {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg ai";
  div.id = "typing";
  div.innerHTML = `<div class="avatar">G</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  addMsg("user", text);
  history.push({ role: "user", parts: [{ text }] });
  showTyping();
  document.getElementById("send").disabled = true;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM }] },
          contents: history,
          generationConfig: { maxOutputTokens: 1000 }
        })
      }
    );
    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "오류가 발생했어. 다시 시도해줘.";
    history.push({ role: "model", parts: [{ text: reply }] });
    hideTyping();
    addMsg("ai", reply);
  } catch {
    hideTyping();
    addMsg("ai", "연결 오류가 발생했어. 다시 시도해줘.");
  }
  document.getElementById("send").disabled = false;
}

document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

addMsg("ai", intro);
</script>
</body>
</html>
